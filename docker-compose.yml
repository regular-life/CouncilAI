services:
  # ── Go Control Plane ─────────────────────────────────────────────────
  go-backend:
    build:
      context: ./services/go-backend
      dockerfile: Dockerfile
    ports:
      - "8080:8080"
    environment:
      - MOCK_LLM=${MOCK_LLM:-false}
      - GEMINI_API_KEY=${GEMINI_API_KEY}
      - OPENROUTER_API_KEY=${OPENROUTER_API_KEY}
      - NVIDIA_NIM_API_KEY=${NVIDIA_NIM_API_KEY}
    volumes:
      - ./config.yaml:/app/config.yaml:ro
    depends_on:
      redis:
        condition: service_healthy
      python-rag:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - councilai-net

  # ── Python RAG Service ───────────────────────────────────────────────
  python-rag:
    build:
      context: ./services/python-rag
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    volumes:
      - chroma-data:/data/chroma_db
      - ./config.yaml:/app/config.yaml:ro
    healthcheck:
      test: [ "CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')" ]
      interval: 20s
      timeout: 10s
      retries: 10
      start_period: 300s
    restart: unless-stopped
    networks:
      - councilai-net

  # ── Redis ────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: [ "CMD", "redis-cli", "ping" ]
      interval: 10s
      timeout: 5s
      retries: 3
    restart: unless-stopped
    networks:
      - councilai-net

  # ── Prometheus ──────────────────────────────────────────────────────
  prometheus:
    image: prom/prometheus:latest
    ports:
      - "9091:9090"
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus
    depends_on:
      - go-backend
    restart: unless-stopped
    networks:
      - councilai-net

  # ── Grafana ─────────────────────────────────────────────────────────
  grafana:
    image: grafana/grafana:latest
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=admin
      - GF_USERS_ALLOW_SIGN_UP=false
    volumes:
      - grafana-data:/var/lib/grafana
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./monitoring/grafana/dashboards:/var/lib/grafana/dashboards:ro
    depends_on:
      - prometheus
    restart: unless-stopped
    networks:
      - councilai-net

  # ── vLLM Local Inference (GPU) ──────────────────────────────────────
  vllm-inference:
    build:
      context: ./services/vllm-inference
    ports:
      - "8001:8001"
    environment:
      - VLLM_MODEL_NAME=${VLLM_MODEL_NAME:-microsoft/Phi-4-mini-instruct}
      - VLLM_DTYPE=${VLLM_DTYPE:-auto}
      - VLLM_MAX_MODEL_LEN=${VLLM_MAX_MODEL_LEN:-4096}
      - VLLM_GPU_MEMORY_UTIL=${VLLM_GPU_MEMORY_UTIL:-0.85}
      - VLLM_QUANTIZATION=${VLLM_QUANTIZATION:-}
      - VLLM_TENSOR_PARALLEL=${VLLM_TENSOR_PARALLEL:-1}
      - VLLM_SWAP_SPACE_GB=${VLLM_SWAP_SPACE_GB:-0}
      - HF_TOKEN=${HF_TOKEN:-}
    volumes:
      - vllm-models:/data/huggingface
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    profiles:
      - local-models
    restart: unless-stopped
    networks:
      - councilai-net

volumes:
  chroma-data:
  redis-data:
  prometheus-data:
  grafana-data:
  vllm-models:


networks:
  councilai-net:
    driver: bridge
