services:
  # ── Go Control Plane ─────────────────────────────────────────────────
  go-backend:
    build:
      context: ./services/go-backend
      dockerfile: Dockerfile
    ports:
      - "8080:8080"
    environment:
      - SERVER_PORT=8080
      - RAG_SERVICE_URL=http://python-rag:8000
      - REDIS_ADDR=redis:6379
      - JWT_SECRET=${JWT_SECRET:-councilai-secret-change-me}
      - MOCK_LLM=true
      - GEMINI_API_KEY=${GEMINI_API_KEY}
      - OPENROUTER_API_KEY=${OPENROUTER_API_KEY}
      - COUNCIL_MODEL_1=${COUNCIL_MODEL_1:-arcee-ai/trinity-large-preview:free}
      - COUNCIL_MODEL_2=${COUNCIL_MODEL_2:-stepfun/step-3.5-flash:free}
      - COUNCIL_MODEL_3=${COUNCIL_MODEL_3:-nvidia/nemotron-3-nano-30b-a3b:free}
      - CHAIRMAN_MODEL=${CHAIRMAN_MODEL:-gemini-3-flash-preview}
      - STAGE_TIMEOUT=${STAGE_TIMEOUT:-30s}
      - LLM_TIMEOUT=${LLM_TIMEOUT:-120s}
    depends_on:
      redis:
        condition: service_healthy
      python-rag:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - councilai-net

  # ── Python RAG Service ───────────────────────────────────────────────
  python-rag:
    build:
      context: ./services/python-rag
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    environment:
      - CHROMA_DB_PATH=/data/chroma_db
      - EMBEDDING_MODEL=${EMBEDDING_MODEL:-BAAI/bge-small-en-v1.5}
    volumes:
      - chroma-data:/data/chroma_db
    healthcheck:
      test: [ "CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')" ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    restart: unless-stopped
    networks:
      - councilai-net

  # ── Redis ────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: [ "CMD", "redis-cli", "ping" ]
      interval: 10s
      timeout: 5s
      retries: 3
    restart: unless-stopped
    networks:
      - councilai-net

  # ── Prometheus ──────────────────────────────────────────────────────
  prometheus:
    image: prom/prometheus:latest
    ports:
      - "9091:9090"
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus
    depends_on:
      - go-backend
    restart: unless-stopped
    networks:
      - councilai-net

  # ── Grafana ─────────────────────────────────────────────────────────
  grafana:
    image: grafana/grafana:latest
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=admin
      - GF_USERS_ALLOW_SIGN_UP=false
    volumes:
      - grafana-data:/var/lib/grafana
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./monitoring/grafana/dashboards:/var/lib/grafana/dashboards:ro
    depends_on:
      - prometheus
    restart: unless-stopped
    networks:
      - councilai-net

volumes:
  chroma-data:
  redis-data:
  prometheus-data:
  grafana-data:


networks:
  councilai-net:
    driver: bridge
